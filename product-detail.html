<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm - TechMobile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="product-detail.css">
</head>

<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <h1 class="logo">TechMobile</h1>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="container">

            <div id="productDetailContainer" class="product-detail-page">
                Đang tải sản phẩm...
            </div>

            <!-- Toast Notification -->
            <div class="toast-container" id="toastContainer"></div>

            <!-- Right Floating Panels -->
            <aside class="right-floating-panels">
                <!-- Mini Cart -->
                <div class="mini-panel cart-mini-panel" id="cartMiniPanel">
                    <div class="mini-panel-header">
                        <h3>Giỏ hàng</h3>
                        <span id="cartMiniCount">0</span>
                    </div>

                    <div class="mini-panel-list" id="cartMiniList">
                        <p class="mini-empty">Giỏ hàng đang trống.</p>
                    </div>
                </div>

                <!-- Compare Mini Cart -->
                <div class="mini-panel compare-mini-panel" id="compareMiniCart">
                    <div class="mini-panel-header">
                        <h3>So sánh sản phẩm</h3>
                        <span id="compareMiniCount">0</span>
                    </div>

                    <div class="mini-panel-list" id="compareMiniList">
                        <p class="mini-empty">Chưa chọn sản phẩm.</p>
                    </div>
                </div>
            </aside>

            <!-- Compare Modal -->
            <div class="compare-modal-overlay" id="compareModal">
                <div class="compare-modal" id="compareModalBox">
                    <div class="compare-modal-layout">
                        <aside class="compare-side-nav">
                            <h4>Mục so sánh</h4>
                            <a href="#quickCompare">Tổng quát</a>
                            <a href="#memoryCompare">Cấu hình bộ nhớ</a>
                            <a href="#displayCameraCompare">Camera, màn hình</a>
                            <a href="#batteryCompare">Pin, sạc</a>
                            <a href="#utilityCompare">Tiện ích</a>
                            <a href="#connectCompare">Kết nối</a>
                            <a href="#designCompare">Thiết kế, vật liệu</a>
                        </aside>

                        <div class="compare-modal-content">
                            <h2>So sánh điện thoại</h2>
                            <div id="compareModalContent"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="data.js"></script>
    <script src="product-detail.js"></script>
</body>

</html>
